  <line x1="29" y1="68" x2="63" y2="68" stroke="#ebebeb" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="29" y1="79" x2="56" y2="79" stroke="#ebebeb" stroke-width="1.5" stroke-linecap="round"/>

